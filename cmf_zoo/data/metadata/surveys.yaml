# Survey-level metadata for the CMF Zoo project.
#
# Keep one top-level entry per plotted CMF sample.
# A single paper/survey may have multiple entries if it reports:
# - all cores
# - prestellar cores
# - protostellar cores
# - bound cores
# - subregions
#
# Internal slope convention:
#   dN/dlogM ∝ M^(-Gamma)
#   Salpeter: Gamma = 1.35
#
# If a paper reports dN/dM ∝ M^(-alpha), then:
#   Gamma = alpha - 1

LANCET_all:
  label: "LANCET-all"
  short_label: "LANCET"
  data_file: "data/catalogues/lancet.csv"
  data_type: "catalogue"
  mass_column: "Mcore"

  region: "G316.8"
  region_type: "massive filament mosaic"

  distance_kpc: 2.8
  resolution_au: 1820
  wavelength_mm: 1.3

  source_extractor: "getsf"
  temperature_method: "environmental mean"
  dust_opacity: null
  gas_to_dust_ratio: 100

  completeness_msun: 0.30
  fit_mass_min_msun: 0.97
  fit_mass_max_msun: null

  reported_slope_type: null     # gamma / alpha / cumulative / none
  reported_gamma: null
  reported_gamma_err_low: null
  reported_gamma_err_high: null

  reference: "Xu et al. in prep."
  bibcode: null
  notes: "The first LANCET paper: https://ui.adsabs.harvard.edu/abs/2026A%26A...708A.251X/abstract. The core catalogue will be published in the LANCET second paper."

